<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ເກມເປີດໄພ່ - Card Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===================== SPLASH / HOME ===================== -->
<div id="splash" class="screen active">
  <div class="splash-bg">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="bubble b5"></div>
  </div>

  <div class="splash-content">
    <div class="title-wrap">
      <h1 class="game-title">
        <span>ເ</span><span>ກ</span><span>ມ</span><span>ເ</span><span>ປີ</span><span>ດ</span><span>ໄ</span><span>ພ່</span>
      </h1>
      <div class="subtitle">Card Flip Party Game</div>
    </div>

    <div class="hero-img-wrap">
      <div class="hero-glow"></div>
      <img src="images/001.jpeg" alt="mascot" class="hero-img" />
    </div>

    <button id="startBtn" class="start-btn">
      <span class="btn-shine"></span>
      <span class="btn-text">ເລີ່ມເກມ</span>
      <span class="btn-icon">▶</span>
    </button>

    <div class="splash-foot">ດື່ມຢ່າງມ່ວນ • ຂັບຂີ່ປອດໄພ</div>
  </div>
</div>

<!-- ===================== GAME SCREEN ===================== -->
<div id="game" class="screen">
  <div class="game-bg">
    <div class="g-bubble gb1"></div>
    <div class="g-bubble gb2"></div>
    <div class="g-bubble gb3"></div>
  </div>

  <header class="topbar">
    <button id="homeBtn" class="icon-btn" aria-label="home">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 3 2 12h3v8h6v-6h2v6h6v-8h3z"/></svg>
    </button>
    <div class="counter">
      <span id="remaining">52</span><span class="slash">/</span><span class="total">52</span>
    </div>
    <button id="soundBtn" class="icon-btn" aria-label="sound">
      <svg id="soundOnIcon" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg>
      <svg id="soundOffIcon" viewBox="0 0 24 24" width="22" height="22" style="display:none"><path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.96 8.96 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
    </button>
  </header>

  <!-- Floating cards arena -->
  <div id="arena" class="arena"></div>

  <!-- Reset floating button -->
  <button id="resetBtn" class="reset-fab" aria-label="reset">
    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    <span>ລ້າງໄພ່</span>
  </button>

  <!-- Speed control -->
  <div class="speed-control">
    <label for="speedRange">ຄວາມໄວ</label>
    <input id="speedRange" type="range" min="1" max="10" value="5" />
  </div>
</div>

<!-- ===================== CARD REVEAL OVERLAY ===================== -->
<div id="revealOverlay" class="reveal-overlay">
  <div class="reveal-back" id="revealBack"></div>
  <div class="reveal-stage">
    <div id="flipper" class="flipper">
      <div class="flip-face flip-back">
        <div class="card-back-pattern">
          <img src="images/001.jpeg" alt="back" class="back-mascot" />
        </div>
      </div>
      <div class="flip-face flip-front" id="flipFront">
        <!-- card content injected -->
      </div>
    </div>
    <button id="okBtn" class="ok-btn">
      <span>ຕົກລົງ</span>
    </button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
